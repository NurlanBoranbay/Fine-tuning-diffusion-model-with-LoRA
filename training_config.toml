# =============================================================================
# training_config.toml - kohya-ss LoRA training configuration for SDXL
# Miles Morales Spider-Verse LoRA
# =============================================================================

[sdxl_arguments]
cache_text_encoder_outputs = true

[model_arguments]
pretrained_model_name_or_path = "stabilityai/stable-diffusion-xl-base-1.0"
v2 = false
v_parameterization = false

[dataset_arguments]
# kohya-ss will read captions from .txt files automatically
train_data_dir = "./img"
resolution = "1024,1024"
enable_bucket = true
min_bucket_reso = 512
max_bucket_reso = 2048
bucket_reso_steps = 64
caption_extension = ".txt"
shuffle_caption = true
keep_tokens = 1
color_aug = false
flip_aug = false

[training_arguments]
output_dir = "./output/model"
output_name = "miles_morales_spiderverse_lora"
save_model_as = "safetensors"
save_precision = "fp16"
save_every_n_epochs = 2
train_batch_size = 1
max_train_epochs = 16
seed = 42
gradient_checkpointing = true
gradient_accumulation_steps = 4
mixed_precision = "bf16"
logging_dir = "./output/logs"
log_prefix = "miles_morales"
noise_offset = 0.0357
adaptive_noise_scale = 0.00357
multires_noise_iterations = 6
multires_noise_discount = 0.3
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
max_token_length = 225

[optimizer_arguments]
optimizer_type = "Prodigy"
learning_rate = 1.0
lr_scheduler = "constant_with_warmup"
lr_warmup_steps = 100
optimizer_args = ["weight_decay=0.01", "decouple=True", "use_bias_correction=True", "d_coef=2.0"]

[network_arguments]
network_module = "networks.lora"
network_dim = 32
network_alpha = 16
network_train_unet_only = false
network_train_text_encoder_only = false

[sample_arguments]
sample_every_n_epochs = 4
sample_sampler = "euler_a"
sample_prompts = "./sample_prompts.txt"
